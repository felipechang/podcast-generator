services:
  app:
    build: .
    image: podcast-generator:latest
    container_name: podcast-generator
    platform: linux/arm64
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    env_file:
      - path: .env
    volumes:
      - ./voices:/voices:ro
      - model-cache:/root/.cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: apple
              count: all
              capabilities: [gpu]

volumes:
  model-cache:
